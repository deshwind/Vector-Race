vehicle:
  # Approximate research values, not proprietary Formula 1 parameters.
  mass_kg: 798.0
  yaw_inertia_kgm2: 1100.0
  wheelbase_m: 3.60
  cg_to_front_m: 1.80
  width_m: 2.00
  max_steer_rad: 0.42
  max_steer_rate_rad_s: 1.20
  max_accel_mps2: 5.0
  max_brake_mps2: 12.0
  max_speed_mps: 92.0
  drag_accel_coefficient: 0.00045
  base_grip_mu: 1.70
  tyre_b: 10.0
  tyre_c: 1.90
  tyre_e: 0.97
  low_speed_blend_mps: 5.0

optimizer:
  points: 220
  safety_margin_m: 0.35
  smoothness_weight: 0.08
  offset_regularization: 0.0001
  max_iterations: 300

speed_profile:
  gravity_mps2: 9.81
  lateral_safety_factor: 0.96
  convergence_tolerance_mps: 0.001
  max_iterations: 100
  minimum_speed_mps: 3.0

safety:
  boundary_margin_m: 0.25
  max_residual_offset_m: 1.50
  max_offset_rate_mps: 0.80
  min_speed_scale_delta: -0.35
  max_speed_scale_delta: 0.10
  max_speed_scale_rate_per_s: 0.35
  # Speed-domain equivalent of the profile's 0.96 acceleration factor.
  friction_safety_factor: 0.98

simulation:
  time_step_s: 0.02
  max_time_s: 240.0
  lookahead_base_m: 5.0
  lookahead_speed_gain_s: 0.24
  speed_kp: 1.4
  steering_kp: 1.20
  start_speed_mps: 8.0
  seed: 7

ppo:
  # First four values are the starting values cited in the review.
  learning_rate: 0.0003
  batch_size: 128
  gamma: 0.99
  ent_coef: 0.01
  n_steps: 2048
  clip_range: 0.2
  gae_lambda: 0.95
  n_epochs: 10
  total_timesteps: 250000
  seed: 7
